name: Mirror to public repo

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ github.token }}

      # Remplace le vrai domaine et supprime le dossier .github avant de pousser
      - name: Sanitize
        run: |
          find . -name "*.yaml" -o -name "*.yml" -o -name "*.md" | \
            grep -v ".git/" | \
            xargs sed -i 's/${{ secrets.REAL_DOMAIN }}/mydomain.fr/g'
          rm -rf .github

      - name: Push to public mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add public "https://x-access-token:${MIRROR_PAT}@github.com/Axtazer/harkesh-k8s-public.git"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sanitize for public mirror"
          git push public HEAD:master --force