---
# ── Backend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altertrack-backend
  namespace: altertrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altertrack-backend
  template:
    metadata:
      labels:
        app: altertrack-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/axtazer/altertrack-backend:latest@sha256:4143a3148a57740b2bd539e6aabb97e29b1643ccc9aef933650ed35694aaf508
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: altertrack-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: altertrack-backend
  namespace: altertrack
spec:
  selector:
    app: altertrack-backend
  ports:
    - port: 3001
      targetPort: 3001
---
# ── Frontend ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altertrack-frontend
  namespace: altertrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altertrack-frontend
  template:
    metadata:
      labels:
        app: altertrack-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/axtazer/altertrack-frontend:latest@sha256:1c5c1094072b48a8599954941707fada8555040b4cddd5d4122179878f3a0a5c
          ports:
            - containerPort: 80
          env:
            - name: VITE_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: altertrack-secrets
                  key: VITE_SUPABASE_URL
            - name: VITE_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: altertrack-secrets
                  key: VITE_SUPABASE_ANON_KEY
            - name: VITE_API_URL
              valueFrom:
                secretKeyRef:
                  name: altertrack-secrets
                  key: VITE_API_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: altertrack-frontend
  namespace: altertrack
spec:
  selector:
    app: altertrack-frontend
  ports:
    - port: 80
      targetPort: 80
---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: altertrack-ingress
  namespace: altertrack
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: altertrack.castaldo.fr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: altertrack-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: altertrack-frontend
                port:
                  number: 80
