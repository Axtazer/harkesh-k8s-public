---
# ── Backend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altertrack-backend
  namespace: altertrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altertrack-backend
  template:
    metadata:
      labels:
        app: altertrack-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/axtazer/altertrack-backend:latest@sha256:d336e1f9bd893bda7795230b5172c505260050426e81de195a12ed74bc81199f
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: altertrack-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: altertrack-backend
  namespace: altertrack
spec:
  selector:
    app: altertrack-backend
  ports:
    - port: 3001
      targetPort: 3001
---
# ── Frontend ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altertrack-frontend
  namespace: altertrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altertrack-frontend
  template:
    metadata:
      labels:
        app: altertrack-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/axtazer/altertrack-frontend:latest@sha256:614ad6519ce8f0489ef5c158d858ae45f34a11eca3bd6ba548f102902917f44b
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: altertrack-frontend
  namespace: altertrack
spec:
  selector:
    app: altertrack-frontend
  ports:
    - port: 80
      targetPort: 80
---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: altertrack-ingress
  namespace: altertrack
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: altertrack.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: altertrack-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: altertrack-frontend
                port:
                  number: 80
