---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axtazia-bot
  namespace: default
  labels:
    app: axtazia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axtazia
  template:
    metadata:
      labels:
        app: axtazia
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: bot
          image: ghcr.io/axtazer/axtazia:latest@sha256:2fabcd27367b8ae4a60afd0059fe64804830fe488b9a8d86b8f569aadfe4a3ba
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: axtazia-secrets

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: axtazia-secrets
  namespace: default
spec:
  itemPath: "vaults/k8s-home/items/axtazia-bot"
---
apiVersion: v1
kind: Service
metadata:
  name: axtazia-bot
  namespace: default
spec:
  selector:
    app: axtazia
  ports:
    - port: 3000
      targetPort: 3000
