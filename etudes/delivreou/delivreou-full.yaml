# =============================================================
# Délivre Où ? — Manifests Kubernetes complets
# DATAGEST
#
# kubectl apply -f delivreou-full.yaml
# =============================================================

# ─────────────────────────────────────────────────────────────
# NAMESPACE
# ─────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Namespace
metadata:
  name: etudes

---
# ─────────────────────────────────────────────────────────────
# SECRET — Variables d'environnement Laravel
# ─────────────────────────────────────────────────────────────
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: delivreou-env
  namespace: etudes
spec:
  itemPath: "vaults/k8s-home/items/delivreou-env"

---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: ghcr-secret
  namespace: etudes
  annotations:
    operator.1password.io/type: kubernetes.io/dockerconfigjson
spec:
  itemPath: "vaults/k8s-home/items/ghcr-token"

---
# ─────────────────────────────────────────────────────────────
# PERSISTENT VOLUME — Données MariaDB (hostPath)
# claimRef réservé exclusivement au PVC dans etudes
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: delivreou-db-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/hdd/data/delivreou/mariadb
  claimRef:
    namespace: etudes
    name: mariadb-data

---
# ─────────────────────────────────────────────────────────────
# PERSISTENT VOLUME CLAIM — Données MariaDB
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: etudes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeName: delivreou-db-pv

---
# ─────────────────────────────────────────────────────────────
# DEPLOYMENT — MariaDB
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivreou-db
  namespace: etudes
  labels:
    app: delivreou
    component: db
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: delivreou
      component: db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: delivreou
        component: db
    spec:
      containers:
        - name: mariadb
          image: mariadb:11@sha256:31c1aa20ba2d78c4cbc45b2675e40ffd6a3cd59897a9767ce88fc284309f55ab
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: delivreou-env
                  key: DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: delivreou-env
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delivreou-env
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delivreou-env
                  key: DB_ROOT_PASSWORD
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data

---
# ─────────────────────────────────────────────────────────────
# SERVICE — MariaDB (ClusterIP, interne uniquement)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: delivreou-db
  namespace: etudes
spec:
  selector:
    app: delivreou
    component: db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP

---
# ─────────────────────────────────────────────────────────────
# DEPLOYMENT — Application Web Laravel
# L'image est mise à jour automatiquement par le workflow CI
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivreou-web
  namespace: etudes
  labels:
    app: delivreou
    component: web
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: delivreou
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: delivreou
        component: web
    spec:
      initContainers:
        # Attend que MariaDB accepte des connexions
        - name: wait-for-db
          image: busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          command:
            - sh
            - -c
            - |
              until nc -z delivreou-db 3306; do
                echo "En attente de MariaDB..."; sleep 3;
              done
              echo "MariaDB disponible."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

        # Lance les migrations avant le démarrage du serveur web
        - name: migrate
          # !! Ligne mise à jour automatiquement par le CI !!
          image: ghcr.io/axtazer/delivreou@sha256:99a2f9c24338757867a9542215489a452d65c27190574ed58c021468498a1cb2
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - secretRef:
                name: delivreou-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      containers:
        - name: web
          # !! Ligne mise à jour automatiquement par le CI !!
          image: ghcr.io/axtazer/delivreou@sha256:99a2f9c24338757867a9542215489a452d65c27190574ed58c021468498a1cb2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: delivreou-env
          # startupProbe : laisse 150s max au cold start avant
          # que readiness/liveness ne prennent le relais
          startupProbe:
            httpGet:
              path: /up
              port: 80
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      imagePullSecrets:
        - name: ghcr-secret

---
# ─────────────────────────────────────────────────────────────
# SERVICE — Web (ClusterIP, exposé via tunnel Cloudflare k8s)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: delivreou-web
  namespace: etudes
spec:
  selector:
    app: delivreou
    component: web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
