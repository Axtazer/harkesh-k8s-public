---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-flo-pro
  namespace: flo-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-flo-pro
  template:
    metadata:
      labels:
        app: dev-flo-pro
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dev-flo-pro
          image: ghcr.io/axtazer/flo-pro:dev@sha256:9e3b076e0f36b831f3652f5d8284f640be50ee306e34e55cc6e3909d80020854
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: flo-pro-env
---
apiVersion: v1
kind: Service
metadata:
  name: dev-flo-pro
  namespace: flo-pro
spec:
  selector:
    app: dev-flo-pro
  ports:
    - port: 81
      targetPort: 3000
