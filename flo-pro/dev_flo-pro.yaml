---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-flo-pro
  namespace: flo-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-flo-pro
  template:
    metadata:
      labels:
        app: dev-flo-pro
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dev-flo-pro
          image: ghcr.io/axtazer/flo-pro:dev@sha256:b5f4cbc2f6d337e7a7f6320e6668d0fec6e6f8e0fdaeb2ac21d52e3c8fff3edf
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: flo-pro-env
---
apiVersion: v1
kind: Service
metadata:
  name: dev-flo-pro
  namespace: flo-pro
spec:
  selector:
    app: dev-flo-pro
  ports:
    - port: 81
      targetPort: 3000
