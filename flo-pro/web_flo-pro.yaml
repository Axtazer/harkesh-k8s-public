---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: flo-pro-env
  namespace: flo-pro
spec:
  itemPath: "vaults/k8s-home/items/flo-pro-env"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flo-pro
  namespace: flo-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flo-pro
  template:
    metadata:
      labels:
        app: flo-pro
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: flo-pro
          image: ghcr.io/axtazer/flo-pro:main@sha256:38f0ef412b9836e7f44a82ad3a31147e4095eb7a75b328cbc746f5bcf6e56fb7
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: flo-pro-env
---
apiVersion: v1
kind: Service
metadata:
  name: dev-flo-pro
  namespace: flo-pro
spec:
  selector:
    app: dev-flo-pro
  ports:
    - port: 81
      targetPort: 3000
