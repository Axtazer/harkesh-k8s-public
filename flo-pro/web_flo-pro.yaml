---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: flo-pro-env
  namespace: flo-pro
spec:
  itemPath: "vaults/k8s-home/items/flo-pro-env"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flo-pro
  namespace: flo-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flo-pro
  template:
    metadata:
      labels:
        app: flo-pro
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: flo-pro
          image: ghcr.io/axtazer/flo-pro:main@sha256:4357a4595eb9c4ebf41bb8c8f1ecf32786feb51646faaddbc85695d31bcacc54
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: flo-pro-env
---
apiVersion: v1
kind: Service
metadata:
  name: flo-pro
  namespace: flo-pro
spec:
  selector:
    app: flo-pro
  ports:
    - port: 80
      targetPort: 3000
