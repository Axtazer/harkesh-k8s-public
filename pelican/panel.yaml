---
apiVersion: v1
kind: Namespace
metadata:
  name: pelican
---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pelican-panel
  namespace: pelican
spec:
  replicas: 1
  selector:
    matchLabels:
      app: panel
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: panel
    spec:
      securityContext:
        fsGroup: 82
        fsGroupChangePolicy: Always
      containers:
        - name: panel
          image: ghcr.io/pelican-dev/panel:latest@sha256:871032c289b7e00a23e1eb701772603750a14b8c7cfa72b072058ce645c41032
          env:
            - name: APP_URL
              value: "https://panel.castaldo.fr"
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: XDG_DATA_HOME
              value: "/pelican-data"
            - name: BEHIND_PROXY
              value: "true"
            - name: APP_TIMEZONE
              value: "Europe/Paris"
            # Fix proxy redirect — Caddy doit faire confiance aux headers X-Forwarded-* de cloudflared
            - name: CADDY_TRUSTED_PROXIES
              value: "trusted_proxies static private_ranges"
            - name: TRUSTED_PROXIES
              value: "*"
          volumeMounts:
            - name: pelican-data
              mountPath: /pelican-data
            - name: pelican-logs
              mountPath: /var/www/html/storage/logs
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1.5Gi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15   # réduit de 90s → 15s
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30   # réduit de 120s → 30s
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: pelican-data
          persistentVolumeClaim:
            claimName: pelican-data-pvc
        - name: pelican-logs
          emptyDir: {}
---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: pelican-panel-svc
  namespace: pelican
spec:
  selector:
    app: panel
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# --- Wings communication ---
apiVersion: v1
kind: Service
metadata:
  name: wings-internal
  namespace: pelican
spec:
  type: ExternalName
  externalName: wings-svc.wings.svc.cluster.local
---
# --- Ingress ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pelican-ingress
  namespace: pelican
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: panel.castaldo.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pelican-panel-svc
                port:
                  number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pelican-data-pvc
  namespace: pelican
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
